<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área privada</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <div class="background-glow"></div>
    <main class="admin-shell">
        <section class="admin-card">
            <h1>Área privada da aniversariante</h1>
            <p>Digite a senha para ver os nomes completos das respostas.</p>

            <form id="admin-form" class="admin-form">
                <input id="admin-password" type="password" placeholder="Senha" required />
                <button type="submit" class="btn">Acessar</button> <button id="btn-exportar" class="btn-export" style="display: none; margin-bottom: 15px; background-color: #217346; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">
    📊 Baixar Planilha Excel
</button>
            </form>

            <div id="admin-message" class="status"></div>
            <table class="admin-table" id="admin-table" hidden>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Status</th>
                        <th>Pessoas</th>
                        <th>E-mail</th>
                        <th>Mensagem</th>
                    </tr>
                </thead>
                <tbody id="admin-body"></tbody>
            </table>
        </section>
    </main>

    <script src="/script.js"></script>
</body>

</html>
